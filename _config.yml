# Intentionally empty.
#
# A `.nojekyll` file in the repo root tells GitHub Pages to skip Jekyll
# entirely and serve the static files as-is. We're not using Jekyll
# templating, Markdown rendering or Liquid — just HTML + CSS + a sprinkle
# of JS — so the bypass is the right move.
#
# We keep _config.yml around so future contributors know this is a
# deliberate choice rather than a missing file.
